<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala | Murad Hasan</title>
    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- daisy + tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- stylesheet -->
    <link rel="stylesheet" href="/styles/style.css">
</head>

<body>
    <!--  header section-->
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <div tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-3">
                        <button class=""><i class="fa-solid fa-circle-question"></i>
                            FAQ</button>
                        <button class=""><i class="fa-solid fa-book-open-reader"></i>
                            Learn</button>
                        <button class=""><i class="fa-solid fa-right-from-bracket"></i>
                            LogOut</button>
                    </div>
                </div>
                <a href="#" class="btn btn-ghost text-xl font-bold">English <img src="./assets/logo.png" alt=""> জানালা
                </a>
            </div>
            <div class="navbar-end hidden lg:flex gap-4">
                <button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button>
                <button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open-reader"></i> Learn</button>
                <button class="btn btn-outline btn-primary"><i class="fa-solid fa-right-from-bracket"></i>
                    LogOut</button>
            </div>
        </div>
    </header>

    <!--  banner section-->
    <section>
        <div class="bg-base-200 min-h-screen card-body">
            <div class="flex flex-col-reverse lg:flex-row  items-center">
                <div class="">
                    <h1 class="text-3xl lg:text-5xl font-bold"><span
                            class="text-3xl lg:text-5xl font-bold text-[#00BCFF]">English</span> is
                        Easy!!</h1>
                    <p class="py-6 bangla text-[18px] font-medium">
                        আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান,
                        আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                    </p>
                    <div class="card w-full max-w-sm ">
                        <div class="">
                            <div class="">
                                <input type="email" class="input" placeholder="Enter Your Name" />
                                <input type="password" class="input my-4" placeholder=".................." />
                                <button class="btn btn-primary">Get Started</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="">
                    <img src="./assets/hero-student.png" alt="">
                </div>
            </div>
    </section>
    <!-- Let's Learn Vocabularies section -->
    <section class="py-2">
        <div class="text-center">
            <h1 class="text-3xl lg:text-5xl font-bold"><span
                    class="text-3xl lg:text-5xl font-bold text-[#00BCFF]">Let's</span> Learn Vocabularies</h1>
        </div>
        <div class="flex gap-4 justify-center my-10 flex-wrap " id="buttonDisplay">

        </div>
    </section>
    <!-- Lesson Select section -->
    <section class="bg-[#F8F8F8] w-11/12 min-h-30 mx-auto rounded-xl my-20">
        <div id="word_container" class="grid grid-cols-1 lg:grid-cols-3 ">
            <div class="py-12 text-center col-span-full">
                <p class="bangla text-[#79716B] text-sm mb-2">আপনি এখনো কোন Lesson Select করেন নি</p>
                <h2 class="bangla font-medium text-3xl">একটি Lesson Select করুন।</h2>
            </div>
        </div>
    </section>

    <!-- modal section -->
    <section>
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="wordDetailsContainer" class="">

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>
    <script src="./sctipts/index.js"></script>
</body>

</html>
